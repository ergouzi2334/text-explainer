<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>划词解释</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
    }
    .tabs {
      display: flex;
      border-bottom: 1px solid #eee;
    }
    .tab {
      flex: 1;
      padding: 12px 0;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab.active { color: #4f46e5; border-bottom-color: #4f46e5; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* 配置面板 */
    .header { padding: 16px 20px 0; font-size: 16px; font-weight: 700; color: #1a1a1a; }
    .status { padding: 8px 20px 16px; font-size: 12px; color: #16a34a; }
    .status.warn { color: #e67e22; }
    .setup { padding: 0 20px 16px; }
    .setup label { display: block; font-size: 12px; font-weight: 600; color: #666; margin-bottom: 4px; }
    .setup input { width: 100%; padding: 8px 10px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 13px; outline: none; }
    .setup input:focus { border-color: #4f46e5; }
    .setup .hint { font-size: 11px; color: #aaa; margin-top: 4px; }
    .setup .hint a { color: #4f46e5; }
    .btn { width: 100%; margin-top: 10px; padding: 8px 0; background: #4f46e5; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
    .btn:hover { background: #4338ca; }
    .btn.ghost { background: none; color: #4f46e5; margin-top: 4px; padding: 4px 0; }
    .msg { padding: 0 20px 12px; font-size: 12px; text-align: center; }
    .msg.ok { color: #16a34a; }
    .msg.err { color: #e74c3c; }
    hr { border: none; border-top: 1px solid #f0f0f0; margin: 8px 20px; }
    .info { padding: 8px 20px 16px; font-size: 12px; color: #888; line-height: 1.6; }

    /* 知识库面板 */
    .kb-header { padding: 12px 16px; }
    .kb-search { width: 100%; padding: 8px 10px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 13px; outline: none; }
    .kb-search:focus { border-color: #4f46e5; }
    .kb-list { max-height: 340px; overflow-y: auto; padding: 0 16px 12px; }
    .kb-item { padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
    .kb-item:last-child { border-bottom: none; }
    .kb-word { font-size: 13px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
    .kb-explain { font-size: 12px; color: #666; line-height: 1.5; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .kb-meta { font-size: 11px; color: #aaa; display: flex; justify-content: space-between; align-items: center; }
    .kb-delete { background: none; border: none; color: #e74c3c; font-size: 11px; cursor: pointer; padding: 2px 6px; }
    .kb-empty { text-align: center; color: #aaa; font-size: 13px; padding: 32px 0; }
  </style>
</head>
<body>
  <div class="tabs">
    <div class="tab active" data-panel="config-panel">配置</div>
    <div class="tab" data-panel="kb-panel">知识库</div>
  </div>

  <!-- 配置面板 -->
  <div id="config-panel" class="panel active">
    <div class="header">划词解释</div>
    <div class="status" id="status"></div>
    <div id="configured" style="display:none">
      <div class="info">选中文字自动解释 · 双击 Ctrl 开启多词模式</div>
      <hr>
      <div style="padding:0 20px 12px">
        <button class="btn ghost" id="changeBtn">更换 API Key</button>
      </div>
    </div>
    <div id="setup" class="setup">
      <label for="apiKey">DeepSeek API Key</label>
      <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
      <div class="hint">在 <a href="https://platform.deepseek.com" target="_blank">platform.deepseek.com</a> 获取</div>
      <button class="btn" id="saveBtn">保存</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <!-- 知识库面板 -->
  <div id="kb-panel" class="panel">
    <div class="kb-header">
      <input type="text" class="kb-search" id="kbSearch" placeholder="搜索已收藏的词汇...">
    </div>
    <div class="kb-list" id="kbList"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
