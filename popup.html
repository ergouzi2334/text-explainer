<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>划词解释</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
    }
    .header {
      padding: 16px 20px 0;
      font-size: 16px;
      font-weight: 700;
      color: #1a1a1a;
    }
    .status {
      padding: 8px 20px 16px;
      font-size: 12px;
      color: #16a34a;
    }
    .status.warn { color: #e67e22; }
    .setup {
      padding: 0 20px 16px;
    }
    .setup label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      margin-bottom: 4px;
    }
    .setup input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    .setup input:focus { border-color: #4f46e5; }
    .setup .hint {
      font-size: 11px;
      color: #aaa;
      margin-top: 4px;
    }
    .setup .hint a { color: #4f46e5; }
    .btn {
      width: 100%;
      margin-top: 10px;
      padding: 8px 0;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn:hover { background: #4338ca; }
    .btn.ghost {
      background: none;
      color: #4f46e5;
      margin-top: 4px;
      padding: 4px 0;
    }
    .msg {
      padding: 0 20px 12px;
      font-size: 12px;
      text-align: center;
    }
    .msg.ok { color: #16a34a; }
    .msg.err { color: #e74c3c; }
    hr {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 8px 20px;
    }
    .info {
      padding: 8px 20px 16px;
      font-size: 12px;
      color: #888;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="header">划词解释</div>
  <div class="status" id="status"></div>

  <!-- 已配置状态 -->
  <div id="configured" style="display:none">
    <div class="info">
      选中文字自动解释 · 双击 Ctrl 开启多词模式
    </div>
    <hr>
    <div style="padding:0 20px 12px">
      <button class="btn ghost" id="changeBtn">更换 API Key</button>
    </div>
  </div>

  <!-- 未配置 / 更换 Key -->
  <div id="setup" class="setup">
    <label for="apiKey">DeepSeek API Key</label>
    <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
    <div class="hint">在 <a href="https://platform.deepseek.com" target="_blank">platform.deepseek.com</a> 获取</div>
    <button class="btn" id="saveBtn">保存</button>
    <div class="msg" id="msg"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
