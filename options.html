<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>划词解释 — 设置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 32px;
      max-width: 460px;
      width: 100%;
    }
    h1 { font-size: 20px; margin-bottom: 8px; color: #1a1a1a; }
    .sub { font-size: 13px; color: #999; margin-bottom: 24px; }
    label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #333; }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4f46e5; }
    .hint { font-size: 12px; color: #999; margin-top: 6px; }
    button {
      margin-top: 16px;
      width: 100%;
      padding: 10px 0;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4338ca; }
    .msg { margin-top: 12px; font-size: 13px; text-align: center; }
    .msg.success { color: #16a34a; }
    .msg.error { color: #e74c3c; }
  </style>
</head>
<body>
  <div class="container">
    <h1>划词解释</h1>
    <p class="sub">配置 DeepSeek API Key 后即可使用</p>
    <label for="apiKey">DeepSeek API Key</label>
    <input type="password" id="apiKey" placeholder="sk-..." autocomplete="off">
    <p class="hint">在 <a href="https://platform.deepseek.com" target="_blank">platform.deepseek.com</a> 获取</p>
    <button id="saveBtn">保存</button>
    <div class="msg" id="msg"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
